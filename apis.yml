aid: roomraccoon
name: RoomRaccoon
description: >-
  RoomRaccoon is an all-in-one hotel management software platform for
  independent hotels, B&Bs, guesthouses, hostels, and small chains, founded
  in 2017 by Tymen van Dyl and Nadja Buckenberger and headquartered in
  Breda, Netherlands with major operations in Cape Town, South Africa, plus
  offices in Valencia, Spain and Lisbon, Portugal. The platform bundles a
  cloud Property Management System (PMS), a Channel Manager that
  synchronises rates, availability, and restrictions across 200+ OTAs,
  metasearch engines, GDSs, and bedbanks, a commission-free Booking Engine
  for direct website bookings with bookable add-ons, RaccoonPay for
  integrated, multi-currency guest payments, and RaccoonRev for competitor
  insights and revenue management. RoomRaccoon advertises 400+ integrations
  with partners such as Booking.com, Expedia, Lightspeed, and Sage, and was
  named World's Best Hotel Channel Manager at the 2023 World Travel Tech
  Awards. A connectivity / partner API exists at api.roomraccoon.com
  (e.g. POS endpoint at /api/?type=POS&version=2) but is access-controlled:
  prospective integrators must request an API key and Hotel ID by emailing
  connectivity@roomraccoon.com, and no public OpenAPI specification, public
  SDKs, or public GitHub organisation are published.
